name: Rerun failed jobs

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The workflow run ID to rerun'
        required: true

jobs:
  rerun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Wait for run to finish, then rerun failed jobs
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          gh run watch "$RUN_ID" > /dev/null 2>&1
          gh run rerun "$RUN_ID" --failed
