name: DuckDB Next Canary

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries (DuckDB main)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@1d3a50b3414534f6787e28c1c5efaafb4beb4e8f
    with:
      duckdb_version: main
      ci_tools_version: main
      extra_toolchains: parser_tools
      # Early warning job only: keep the same unsupported WASM exclusions as the stable build.
      exclude_archs: wasm_mvp;wasm_eh;wasm_threads
      # Avoid private cache coupling for the DuckDB-main canary job.
      vcpkg_binary_sources: clear;http,https://vcpkg-cache.duckdb.org,read
      extension_name: duckhog
